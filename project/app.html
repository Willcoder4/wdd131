<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GrowNow Goal Tracker - Manage and monitor your path to success.">
    <title>GrowNow | Goal Tracker</title>
    <link rel="stylesheet" href="styles/grownow.css">
    <script src="scripts/app.js" defer></script>
</head>
<body>
    <header>
        <a href="index.html" class="logo">GrowNow</a>
        <nav>
            <button class="menu-button" title="Toggle navigation menu">
                <div class="menu-bar"></div>
                <div class="menu-bar"></div>
                <div class="menu-bar"></div>
            </button>
            
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="education.html">Learn</a></li>
                <li><a href="app.html">Tracker</a></li>
            </ul>
        </nav>
    </header>

    <main class="container">
        <section class="tracker-intro">
            <h1>Your Growth Dashboard</h1>
            <p>Transform your abstract ambitions into actionable plans below.</p>
        </section>

        <section class="form-box">
            <h2>Set a New Goal</h2>
            <form id="goal-form">
                <label for="goalName">Goal Name</label>
                <input type="text" id="goalName" placeholder="e.g., Master CSS Grid" required>

                <label for="goalCategory">Category</label>
                <select id="goalCategory">
                    <option value="Personal">Personal Growth</option>
                    <option value="Education">Education</option>
                    <option value="Business">Professional/Business</option>
                    <option value="Health">Health & Wellness</option>
                </select>

                <button type="submit" class="btn-primary">Add to Tracker</button>
            </form>
        </section>

        <section>
            <h2>Active Goals</h2>
            <div id="goal-display" class="feature-list">
                </div>
        </section>
    </main>

    <footer>
        <p>Copyright 2026 GrowNow | All Rights Reserved</p>
    </footer>
</body>
</html>
