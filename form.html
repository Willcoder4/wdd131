<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Product Review Form</title>
    <meta name="description" content="Submit a review for our latest products.">
    <link rel="stylesheet" href="week05/styles/forms.css">
    <script src="week05/scripts/form.js" defer></script>
</head>
<body>
    <header>
        <h1>Product Review</h1>
    </header>
    <main>
        <form id="reviewForm" action="review.html" method="get">
            <fieldset>
                <legend>Product Details</legend>
                
                <label for="productName">Product Name <span class="required">*</span></label>
                <select id="productName" name="productName" required>
                    <option value="" disabled selected>Choose a Product ...</option>
                </select>

                <div class="rating-group">
                    <p>Overall Rating <span class="required">*</span></p>
                    <div class="stars">
                        <label><input type="radio" name="rating" value="1" required> <span>☆</span></label>
                        <label><input type="radio" name="rating" value="2"> <span>☆☆</span></label>
                        <label><input type="radio" name="rating" value="3"> <span>☆☆☆</span></label>
                        <label><input type="radio" name="rating" value="4"> <span>☆☆☆☆</span></label>
                        <label><input type="radio" name="rating" value="5"> <span>☆☆☆☆☆</span></label>
                    </div>
                </div>

                <label for="installDate">Date of Installation <span class="required">*</span></label>
                <input type="date" id="installDate" name="installDate" required>

                <p>Which features did you find useful? (Check all that apply)</p>
                <div class="checkbox-group">
                    <label><input type="checkbox" name="features" value="durability" id="durability"> Durability</label>
                    <label><input type="checkbox" name="features" value="ease" id="ease"> Ease of Use</label>
                    <label><input type="checkbox" name="features" value="performance" id="performance"> Performance</label>
                    <label><input type="checkbox" name="features" value="design" id="design"> Design</label>
                </div>

                <label for="writtenReview">Written Review (Optional)</label>
                <textarea id="writtenReview" name="writtenReview" rows="4"></textarea>

                <label for="userName">Your Name (Optional)</label>
                <input type="text" id="userName" name="userName">

                <input type="submit" value="Post Review">
            </fieldset>
        </form>
    </main>
    <footer>
        <p>&copy;<span id="currentYear"></span> ✨ Fegor William Abije ✨ Nigeria</p>
        <p>Last Modification: <span id="lastMod"></span></p>
    </footer>
</body>
</html>
